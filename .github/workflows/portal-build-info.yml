name: Portal build-info

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
    paths-ignore:
      - 'docs/assets/build-info.json'

permissions:
  contents: write

jobs:
  refresh-build-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh build-info.json from HEAD
        run: node scripts/update-portal-build-info.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet docs/assets/build-info.json; then
            echo "build-info.json already matches HEAD"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/build-info.json
          git commit -m "chore: refresh portal build-info"
          git push
